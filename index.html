<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QytetiYnë</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; color: #222; }
  header { background: #1D9E75; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 20px; font-weight: 600; }
  header span { font-size: 13px; opacity: 0.85; }
  .tabs { display: flex; background: white; border-bottom: 1px solid #e0e0e0; }
  .tab { flex: 1; padding: 14px; text-align: center; font-size: 14px; cursor: pointer; color: #666; border-bottom: 3px solid transparent; transition: all .2s; }
  .tab.active { color: #1D9E75; border-bottom-color: #1D9E75; font-weight: 500; }
  .section { display: none; padding: 16px; max-width: 680px; margin: 0 auto; }
  .section.active { display: block; }
  .card { background: white; border-radius: 12px; border: 1px solid #e8e8e8; padding: 16px; margin-bottom: 12px; }
  label { font-size: 13px; color: #666; display: block; margin-bottom: 5px; margin-top: 12px; }
  label:first-child { margin-top: 0; }
  input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fff; color: #222; outline: none; font-family: inherit; }
  input:focus, select:focus, textarea:focus { border-color: #1D9E75; box-shadow: 0 0 0 3px rgba(29,158,117,.12); }
  textarea { resize: vertical; min-height: 80px; }
  .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 4px; }
  .cat-btn { border: 1px solid #ddd; border-radius: 10px; padding: 10px 6px; cursor: pointer; background: white; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 12px; color: #555; transition: all .15s; }
  .cat-btn:hover { background: #f0fdf8; }
  .cat-btn.selected { border-color: #1D9E75; background: #e1f5ee; color: #085041; font-weight: 500; }
  .cat-btn .ic { font-size: 22px; }
  .submit-btn { width: 100%; margin-top: 16px; padding: 12px; background: #1D9E75; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; }
  .submit-btn:hover { background: #0F6E56; }
  .report-card { background: white; border-radius: 12px; border: 1px solid #e8e8e8; padding: 14px; margin-bottom: 10px; display: flex; gap: 12px; align-items: flex-start; }
  .report-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .report-info { flex: 1; }
  .report-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .report-loc { font-size: 12px; color: #888; margin-bottom: 6px; }
  .report-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .status-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; cursor: pointer; border: none; }
  .s-hapur { background: #FAECE7; color: #712B13; }
  .s-proces { background: #FAEEDA; color: #633806; }
  .s-zgjidhur { background: #EAF3DE; color: #27500A; }
  .report-date { font-size: 11px; color: #aaa; margin-left: auto; }
  .filter-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .fbtn { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid #ddd; background: white; color: #666; cursor: pointer; }
  .fbtn.active { background: #1D9E75; color: white; border-color: #1D9E75; }
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat-box { background: white; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #e8e8e8; }
  .stat-num { font-size: 28px; font-weight: 600; }
  .stat-lbl { font-size: 12px; color: #888; margin-top: 4px; }
  .empty { text-align: center; padding: 40px 20px; color: #aaa; font-size: 14px; }
  .loading { text-align: center; padding: 20px; color: #aaa; font-size: 14px; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #085041; color: white; padding: 10px 22px; border-radius: 10px; font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
  .bar-wrap { margin-bottom: 14px; }
  .bar-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .bar-bg { background: #f0f0f0; border-radius: 4px; height: 8px; }
  .bar-fill { height: 100%; background: #1D9E75; border-radius: 4px; }
</style>
</head>
<body>
<header>
  <div style="width:36px;height:36px;background:rgba(255,255,255,0.25);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px">🏙️</div>
  <div><h1>QytetiYnë</h1><span>Raporto probleme në qytet</span></div>
</header>
<div class="tabs">
  <div class="tab active" onclick="sw('raporto')">Raporto</div>
  <div class="tab" onclick="sw('lista')">Lista</div>
  <div class="tab" onclick="sw('statistika')">Statistika</div>
</div>
<div id="s-raporto" class="section active">
  <div class="card">
    <label>Lloji i problemit</label>
    <div class="cat-grid" id="cat-grid"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label>Prioriteti</label>
        <select id="inp-pri">
          <option value="i lartë">I lartë</option>
          <option value="mesatar" selected>Mesatar</option>
          <option value="i ulët">I ulët</option>
        </select>
      </div>
      <div><label>Rrethi / Lagja</label>
        <select id="inp-zone">
          <option value="">— Zgjidh —</option>
          <option>Blloku</option><option>Kombinat</option><option>Kinostudio</option>
          <option>Lapraka</option><option>Myslym Shyri</option><option>Njësia 6</option>
          <option>Njësia 7</option><option>Njësia 9</option><option>Njësia 10</option>
          <option>Njësia 11</option><option>Tjetër</option>
        </select>
      </div>
    </div>
    <label>Adresa / Vendndodhja</label>
    <input id="inp-loc" type="text" placeholder="p.sh. Rruga Dëshmorët e Kombit, nr. 12">
    <label>Përshkrim (opsional)</label>
    <textarea id="inp-desc" placeholder="Detaje shtesë rreth problemit..."></textarea>
    <button class="submit-btn" onclick="submitReport()">Dërgo raportin</button>
  </div>
</div>
<div id="s-lista" class="section">
  <div class="filter-row" id="frow"></div>
  <div id="list-el"><div class="loading">Duke ngarkuar...</div></div>
</div>
<div id="s-statistika" class="section">
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-num" id="st-tot">0</div><div class="stat-lbl">Gjithsej</div></div>
    <div class="stat-box"><div class="stat-num" id="st-op" style="color:#D85A30">0</div><div class="stat-lbl">Hapur</div></div>
    <div class="stat-box"><div class="stat-num" id="st-pr" style="color:#BA7517">0</div><div class="stat-lbl">Në proces</div></div>
    <div class="stat-box"><div class="stat-num" id="st-zg" style="color:#3B6D11">0</div><div class="stat-lbl">Zgjidhur</div></div>
  </div>
  <div class="card" id="cat-st"></div>
</div>
<div class="toast" id="toast"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyB6nDJ1X3efuqeX0-t-9NAODfjD3AYghbc",
  authDomain: "qytetiyne.firebaseapp.com",
  databaseURL: "https://qytetiyne-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "qytetiyne",
  storageBucket: "qytetiyne.firebasestorage.app",
  messagingSenderId: "786171527486",
  appId: "1:786171527486:web:2fd9b22e0beb712f0b6c6f",
  measurementId: "G-9LFY9WF9H9"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const CATS = [
  {v:'Gropë në rrugë',ic:'🕳️',bg:'#FAECE7'},{v:'Dritë e prishur',ic:'💡',bg:'#FAEEDA'},
  {v:'Mbeturina',ic:'🗑️',bg:'#EAF3DE'},{v:'Ujë / Energji',ic:'🔧',bg:'#E6F1FB'},
  {v:'Trotuare të dëmtuara',ic:'🧱',bg:'#F1EFE8'},{v:'Pemë / Gjelbërim',ic:'🌳',bg:'#EAF3DE'},
  {v:'Trafik / Sinjalistikë',ic:'🚦',bg:'#FAEEDA'},{v:'Ndotje e ajrit',ic:'🌫️',bg:'#F1EFE8'},
  {v:'Zhurmë',ic:'🔊',bg:'#FBEAF0'},{v:'Kanalizime',ic:'🪠',bg:'#FAECE7'},
  {v:'Parkim i paligjshëm',ic:'🚗',bg:'#E6F1FB'},{v:'Ndërtim i paligjshëm',ic:'🏗️',bg:'#FCEBEB'},
];
let selCat='',curFilter='të gjitha',allReports=[];
const getIcon=v=>(CATS.find(c=>c.v===v)||{ic:'📌'}).ic;
const getBg=v=>(CATS.find(c=>c.v===v)||{bg:'#f0f0f0'}).bg;
function buildCatGrid(){
  document.getElementById('cat-grid').innerHTML=CATS.map(c=>
    `<button class="cat-btn" onclick="selC(this,'${c.v}')"><span class="ic">${c.ic}</span><span>${c.v}</span></button>`
  ).join('');
}
window.selC=function(btn,val){document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selCat=val;};
window.sw=function(t){['raporto','lista','statistika'].forEach((n,i)=>{document.querySelectorAll('.tab')[i].classList.toggle('active',n===t);document.getElementById('s-'+n).classList.toggle('active',n===t);});if(t==='statistika')renderStats();};
function buildFilters(){document.getElementById('frow').innerHTML=['të gjitha','hapur','në proces','zgjidhur'].map(o=>`<button class="fbtn${o===curFilter?' active':''}" onclick="setF(this,'${o}')">${o.charAt(0).toUpperCase()+o.slice(1)}</button>`).join('');}
window.setF=function(btn,f){curFilter=f;buildFilters();renderList();};
function statusClass(s){return s==='hapur'?'s-hapur':s==='në proces'?'s-proces':'s-zgjidhur';}
function renderList(){
  buildFilters();
  const el=document.getElementById('list-el');
  let data=curFilter==='të gjitha'?allReports:allReports.filter(r=>r.status===curFilter);
  if(!data.length){el.innerHTML='<div class="empty">Nuk ka raporte.</div>';return;}
  el.innerHTML=data.map(r=>`<div class="report-card"><div class="report-icon" style="background:${getBg(r.cat)}">${getIcon(r.cat)}</div><div class="report-info"><div class="report-title">${r.cat}</div><div class="report-loc">${r.zone?r.zone+' · ':''}${r.loc}${r.desc?' · '+r.desc:''}</div><div class="report-footer"><button class="status-badge ${statusClass(r.status)}" onclick="cycleS('${r.id}','${r.status}')">${r.status}</button><span class="report-date">${r.date}</span></div></div></div>`).join('');
}
window.cycleS=async function(id,current){const cycle=['hapur','në proces','zgjidhur'];await updateDoc(doc(db,'raportet',id),{status:cycle[(cycle.indexOf(current)+1)%3]});};
window.submitReport=async function(){
  const loc=document.getElementById('inp-loc').value.trim();
  const zone=document.getElementById('inp-zone').value;
  const desc=document.getElementById('inp-desc').value.trim();
  const pri=document.getElementById('inp-pri').value;
  if(!selCat){showToast('Zgjidhni llojin e problemit!');return;}
  if(!loc){showToast('Shkruani vendndodhjen!');return;}
  await addDoc(collection(db,'raportet'),{cat:selCat,loc,zone,desc,pri,status:'hapur',date:new Date().toLocaleDateString('sq-AL'),createdAt:Date.now()});
  document.getElementById('inp-loc').value='';document.getElementById('inp-desc').value='';document.getElementById('inp-zone').value='';document.getElementById('inp-pri').value='mesatar';
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('selected'));selCat='';
  showToast('Raporti u dërgua! ✓');
};
function renderStats(){
  document.getElementById('st-tot').textContent=allReports.length;
  document.getElementById('st-op').textContent=allReports.filter(r=>r.status==='hapur').length;
  document.getElementById('st-pr').textContent=allReports.filter(r=>r.status==='në proces').length;
  document.getElementById('st-zg').textContent=allReports.filter(r=>r.status==='zgjidhur').length;
  const cats={};allReports.forEach(r=>cats[r.cat]=(cats[r.cat]||0)+1);
  const el=document.getElementById('cat-st');
  if(!Object.keys(cats).length){el.innerHTML='<div class="empty">Nuk ka të dhëna akoma.</div>';return;}
  const mx=Math.max(...Object.values(cats));
  el.innerHTML='<div style="font-size:13px;font-weight:500;color:#888;margin-bottom:14px">Sipas kategorisë</div>'+Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([cat,cnt])=>`<div class="bar-wrap"><div class="bar-label"><span>${getIcon(cat)} ${cat}</span><span style="color:#888">${cnt}</span></div><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(cnt/mx*100)}%"></div></div></div>`).join('');
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
const q=query(collection(db,'raportet'),orderBy('createdAt','desc'));
onSnapshot(q,snap=>{allReports=snap.docs.map(d=>({id:d.id,...d.data()}));renderList();renderStats();});
buildCatGrid();buildFilters();
</script>
</body>
</html>
