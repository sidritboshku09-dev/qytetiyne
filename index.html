<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QytetiYnë 🏙️</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>emailjs.init("VsleY6nsIQRNQWwCu");</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #333; }
  header { background: #1a73e8; color: white; padding: 18px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1.4rem; }
  .tabs { display: flex; background: white; border-bottom: 2px solid #e0e0e0; }
  .tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; font-weight: 600; color: #666; border-bottom: 3px solid transparent; transition: all .2s; }
  .tab.active { color: #1a73e8; border-bottom-color: #1a73e8; }
  .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
  .page.active { display: block; }
  .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  label { display: block; margin-bottom: 6px; font-weight: 600; font-size: .9rem; color: #555; }
  select, input, textarea { width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 1rem; margin-bottom: 14px; outline: none; transition: border .2s; }
  select:focus, input:focus, textarea:focus { border-color: #1a73e8; }
  textarea { height: 90px; resize: vertical; }
  .btn { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background .2s; }
  .btn:hover { background: #1558b0; }
  .btn:disabled { background: #aaa; cursor: not-allowed; }
  .msg { text-align: center; padding: 12px; border-radius: 8px; margin-top: 12px; font-weight: 600; display: none; }
  .msg.success { background: #e6f4ea; color: #2e7d32; display: block; }
  .msg.error { background: #fdecea; color: #c62828; display: block; }
  .priority { display: flex; gap: 10px; margin-bottom: 14px; }
  .priority label { flex: 1; text-align: center; padding: 10px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: .85rem; margin: 0; }
  .priority input[type=radio] { display: none; }
  .priority input:checked + label { border-color: #1a73e8; background: #e8f0fe; color: #1a73e8; }
  .raport-card { background: white; border-radius: 10px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.07); border-left: 4px solid #1a73e8; }
  .raport-card h3 { font-size: 1rem; margin-bottom: 6px; }
  .raport-card p { font-size: .85rem; color: #666; margin-bottom: 3px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .75rem; font-weight: 700; }
  .badge.i-larte { background: #fdecea; color: #c62828; }
  .badge.mesatar { background: #fff8e1; color: #f57f17; }
  .badge.i-ulet { background: #e8f5e9; color: #2e7d32; }
  .empty { text-align: center; color: #aaa; padding: 40px 0; font-size: 1rem; }
</style>
</head>
<body>

<header>
  <span style="font-size:1.8rem">🏙️</span>
  <h1>QytetiYnë</h1>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('raporto')">📋 Raporto</div>
  <div class="tab" onclick="showTab('raportet')">📂 Raportet</div>
</div>

<div class="page active" id="raporto">
  <div class="card">
    <label>Kategoria</label>
    <select id="kategoria">
      <option value="">-- Zgjidh kategorinë --</option>
      <optgroup label="Rrugë & Infrastrukturë">
        <option>Gropë në rrugë</option>
        <option>Trotuar i dëmtuar</option>
        <option>Parkimi i paligjshëm</option>
        <option>Ndërtim i paligjshëm</option>
      </optgroup>
      <optgroup label="Mjedis">
        <option>Mbeturina</option>
        <option>Pemë/Gjelbërim</option>
        <option>Ndotje e ajrit</option>
        <option>Zhurmë</option>
      </optgroup>
      <optgroup label="Shërbime">
        <option>Dritë e prishur</option>
        <option>Ujë/Energji</option>
        <option>Kanalizime</option>
      </optgroup>
      <optgroup label="Lëvizja">
        <option>Trafik/Sinjalistikë</option>
      </optgroup>
    </select>

    <label>Rrethi/Lagja</label>
    <select id="rrethi">
      <option value="">-- Zgjidh rrethин --</option>
      <option>Blloku</option><option>Kombinat</option><option>Don Bosko</option>
      <option>Fresku</option><option>Kinostudio</option><option>Laprakë</option>
      <option>Mezez</option><option>Myslym Shyri</option><option>Pallati me Shigjeta</option>
      <option>Pazari i Ri</option><option>Porcelani</option><option>Rruga e Elbasanit</option>
      <option>Sauk</option><option>Selitë</option><option>Tirana e Re</option>
      <option>Unaza e Re</option><option>Vasil Shanto</option><option>Zogu i Zi</option>
      <option>Tjeter</option>
    </select>

    <label>Vendndodhja (adresa)</label>
    <input type="text" id="vendndodhja" placeholder="p.sh. Rruga Myslym Shyri, nr. 14">

    <label>Prioriteti</label>
    <div class="priority">
      <input type="radio" name="prioriteti" id="p1" value="I lartë">
      <label for="p1">🔴 I lartë</label>
      <input type="radio" name="prioriteti" id="p2" value="Mesatar" checked>
      <label for="p2">🟡 Mesatar</label>
      <input type="radio" name="prioriteti" id="p3" value="I ulët">
      <label for="p3">🟢 I ulët</label>
    </div>

    <label>Përshkrimi</label>
    <textarea id="pershkrimi" placeholder="Përshkruaj problemin me disa fjalë..."></textarea>

    <button class="btn" onclick="dergoProblem()" id="btnDergo">📤 Dërgo Raportin</button>
    <div class="msg" id="msgBox"></div>
  </div>
</div>

<div class="page" id="raportet">
  <div id="lista-raportet"><p class="empty">Duke ngarkuar raportet...</p></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzAnALey_A0UCpKKMXRD2uhgQR-xWwpx6dUMmq5tZw3AVBJZMxPkQ7306RniShavxXPqw/exec";
const EMAILJS_SERVICE = "service_17i5cif";
const EMAILJS_TEMPLATE = "template_ynpz7k9";

let raportet = JSON.parse(localStorage.getItem("raportet") || "[]");

function showTab(tab) {
  document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", ["raporto","raportet"][i] === tab));
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
  if (tab === "raportet") shfaqRaportet();
}

async function dergoProblem() {
  const kategoria = document.getElementById("kategoria").value;
  const rrethi = document.getElementById("rrethi").value;
  const vendndodhja = document.getElementById("vendndodhja").value.trim();
  const prioriteti = document.querySelector("input[name=prioriteti]:checked").value;
  const pershkrimi = document.getElementById("pershkrimi").value.trim();

  if (!kategoria || !rrethi || !vendndodhja || !pershkrimi) {
    shfaqMsg("⚠️ Plotëso të gjitha fushat!", "error");
    return;
  }

  const btn = document.getElementById("btnDergo");
  btn.disabled = true;
  btn.textContent = "Duke dërguar...";

  const data = new Date().toLocaleString("sq-AL");

  const payload = { data, kategoria, rrethi, vendndodhja, prioriteti, pershkrimi };

  // 1. Dergo te Google Sheets
  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
  } catch(e) { console.log("Sheets error:", e); }

  // 2. Dergo email me EmailJS
  try {
    await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
      kategoria,
      vendndodhja,
      rrethi,
      prioriteti,
      pershkrimi,
      data
    });
  } catch(e) { console.log("EmailJS error:", e); }

  // 3. Ruaj lokalisht
  raportet.unshift(payload);
  localStorage.setItem("raportet", JSON.stringify(raportet));

  shfaqMsg("✅ Raporti u dërgua! Email njoftimi u dërgua.", "success");

  document.getElementById("kategoria").value = "";
  document.getElementById("rrethi").value = "";
  document.getElementById("vendndodhja").value = "";
  document.getElementById("pershkrimi").value = "";
  document.getElementById("p2").checked = true;

  btn.disabled = false;
  btn.textContent = "📤 Dërgo Raportin";
}

function shfaqRaportet() {
  const lista = document.getElementById("lista-raportet");
  if (!raportet.length) {
    lista.innerHTML = '<p class="empty">Nuk ka raporte ende.<br>Bëhu i pari që raporton! 🏙️</p>';
    return;
  }
  lista.innerHTML = raportet.map(r => `
    <div class="raport-card">
      <h3>${r.kategoria}</h3>
      <p>📍 ${r.vendndodhja} — ${r.rrethi}</p>
      <p>📅 ${r.data}</p>
      <p>${r.pershkrimi}</p>
      <span class="badge ${r.prioriteti==='I lartë'?'i-larte':r.prioriteti==='Mesatar'?'mesatar':'i-ulet'}">${r.prioriteti}</span>
    </div>
  `).join("");
}

function shfaqMsg(txt, tip) {
  const el = document.getElementById("msgBox");
  el.textContent = txt;
  el.className = "msg " + tip;
  setTimeout(() => el.className = "msg", 5000);
}
</script>
</body>
</html>
